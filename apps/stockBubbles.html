<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Bubbles</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000000; font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        /* Header container */
        #header { position: fixed; top: 0; left: 0; right: 0; z-index: 30; }
        #controls { height: 64px; display: flex; align-items: center; justify-content: space-between; color: white; background: rgba(0,0,0,0.45); padding: 10px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.6); }
        
        /* Progress bar container */
        #progress-container { position: fixed; top: 64px; left: 0; right: 0; height: 4px; background: rgba(255,255,255,0.06); z-index: 25; }
        #progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg,#00d97e,#00a86b); transition: width 0.18s linear; }
        
        /* Bubbles container */
        #bubbles-container { position: fixed; top: 68px; left: 0; right: 0; bottom: 0; z-index: 10; }
        canvas { display: block; width: 100%; height: 100%; }

        /* Responsive design for mobile */
        @media (max-width: 768px) {
            #controls { height: 48px; padding: 8px 16px; }
            #controls strong { font-size: 18px; }
            #controls span { font-size: 12px; }
            #progress-container { top: 48px; }
            #bubbles-container { top: 52px; }
        }
    </style>
</head>
<body>

    <!-- Header Container -->
    <div id="header">
        <div id="controls">
            <div style="display:flex; align-items:center; gap:12px">
                <strong style="font-size:20px">Alpha Bubbles</strong>
                <span id="status" style="font-size:13px; color:#ddd">Loading market data...</span>
            </div>
        </div>
        <!-- Progress Bar Container -->
        <div id="progress-container"><div id="progress-bar"></div></div>
    </div>

    <!-- Bubbles Container -->
    <div id="bubbles-container"></div>

<script>
// --- CONFIGURATION ---
const API_KEY = 'PKMGEVTEOG26N7FTKGP34IYNZU';
const SECRET_KEY = 'UHpp39woj29vzm6paLknWEmf6RKZPMy7EhYkxx6oxAz';
const SPY_CONSTITUENTS_URL = 'https://data.alpaca.markets/v2/stocks/constituents?symbol=SPY';
let symbolList = [];

const TOP_SP500_FALLBACK = [
    'AAPL','MSFT','AMZN','GOOGL','NVDA','META','TSLA','BRK.B','UNH','JNJ',
    'V','JPM','PG','MA','AVGO','NVDA','HD','KO','PEP','MRK','VZ','CMCSA','ADBE','NFLX','NKE','INTC','T','ABT','XOM','CVX','CSCO','PFE','ORCL','TMO','WMT','PEP','LLY','CRM','ACN','COST','MCD','DHR','WFC','QCOM','MDT','NEE','HON','AMGN','ABBV','BMY','TXN','UPS','INTU','RTX','LOW','UNP','PM','MS','IBM','BIDU','SBUX','CAT','GE','AXP','MMM','GILD','AMD','LMT','BA','GS','AMT','BLK','CVS','SNY','CHTR','ADP','ISRG','PM','SYK','MO','SPGI','CCI','PLD','CB','PYPL','ANTM','TGT','ADSK','DE','ZTS','MDLZ','SCHW','CI','BDX','LRCX','REGN','DUK','ETN','SYF'
];

// --- PHYSICS ENGINE SETUP ---
const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Events } = Matter;
const engine = Engine.create();
const world = engine.world;
engine.gravity.y = 0; // Floating bubbles (no gravity)

let HEADER_HEIGHT = window.innerWidth <= 768 ? 52 : 68; // header + progress bar
let width = window.innerWidth;
let height = window.innerHeight - HEADER_HEIGHT;

function getBubbleScale() {
    const baseArea = 1600 * 900;
    const currentArea = width * height;
    const areaScale = Math.sqrt(currentArea / baseArea);
    return Math.max(0.35, Math.min(1.0, areaScale));
}

function getBaseBubbleRadius(change) {
    const scale = getBubbleScale();
    return (40 + Math.abs(change) * 8) * scale;
}

async function fetchTopSP500Symbols() {
    try {
        const response = await fetch(SPY_CONSTITUENTS_URL, {
            headers: { 'APCA-API-KEY-ID': API_KEY, 'APCA-API-SECRET-KEY': SECRET_KEY }
        });
        if (!response.ok) throw new Error('Failed to fetch constituents: ' + response.status);
        const data = await response.json();

        // Alpaca may return .constituents or .symbols
        let symbols = [];
        if (Array.isArray(data.constituents)) {
            symbols = data.constituents.map(item => item.symbol).filter(s => !!s);
        } else if (Array.isArray(data.symbols)) {
            symbols = data.symbols.filter(s => !!s);
        }

        if (!symbols.length) throw new Error('No symbols in constituents response');

        // Keep top 100 from response order (usually by index weight)
        return symbols.slice(0, 100);
    } catch (error) {
        console.warn('Could not fetch SP500 constituents from Alpaca, using fallback list', error);
        return TOP_SP500_FALLBACK.slice(0, 100);
    }
}

const render = Render.create({
    element: document.getElementById('bubbles-container'),
    engine: engine,
    options: { width, height, wireframes: false, background: '#000000' }
});

Render.run(render);
Runner.run(Runner.create(), engine);

// Add invisible walls so bubbles don't fly away
const wallOptions = { isStatic: true, render: { visible: false } };
Composite.add(world, [
    Bodies.rectangle(width/2, -50, width, 100, wallOptions),         // Top
    Bodies.rectangle(width/2, height+50, width, 100, wallOptions),  // Bottom
    Bodies.rectangle(-50, height/2, 100, height, wallOptions),      // Left
    Bodies.rectangle(width+50, height/2, 100, height, wallOptions)  // Right
]);

// Add mouse control so you can toss the bubbles around
const mouse = Mouse.create(render.canvas);
// Hide the visual constraint line (prevents the yellow line while dragging)
const mouseConstraint = MouseConstraint.create(engine, {
    mouse: mouse,
    constraint: { render: { visible: false } }
});
Composite.add(world, mouseConstraint);

// Robust release logic to prevent bubbles from getting "stuck" to the cursor
const releaseDrag = () => {
    if (mouseConstraint.mouse) {
        mouseConstraint.mouse.button = -1; // Force reset internal button state
    }
    mouseConstraint.constraint.bodyB = null;
    mouseConstraint.constraint.pointA = null;
    mouseConstraint.body = null;
};

window.addEventListener('mouseup', releaseDrag);
window.addEventListener('mouseleave', releaseDrag);
window.addEventListener('blur', releaseDrag);
document.getElementById('bubbles-container').addEventListener('mouseleave', releaseDrag);

// --- DATA FETCHING & BUBBLE CREATION ---
async function fetchAndCreateBubbles() {
    try {
        if (!symbolList.length) {
            symbolList = await fetchTopSP500Symbols();
        }

        const snapshotUrl = `https://data.alpaca.markets/v2/stocks/snapshots?symbols=${symbolList.join(',')}`;
        const response = await fetch(snapshotUrl, {
            headers: { 'APCA-API-KEY-ID': API_KEY, 'APCA-API-SECRET-KEY': SECRET_KEY }
        });
        const data = await response.json();
        document.getElementById('status').innerText = "Live Market Data Active";

        const symbols = Object.keys(data);
        // create or update bubbles with initial snapshot info
        const bodies = Composite.allBodies(world);
        symbols.forEach((symbol) => {
            const stock = data[symbol];
            const price = stock.latestTrade && stock.latestTrade.p ? stock.latestTrade.p : null;
            const prevClose = stock.prevDailyBar && stock.prevDailyBar.c ? stock.prevDailyBar.c : null;
            const change = (price && prevClose) ? ((price - prevClose) / prevClose * 100) : 0;

            const existing = bodies.find(b => b.ticker === symbol);
            if (existing) {
                existing._meta = existing._meta || {};
                existing._meta.prevClose = prevClose;
                existing._meta.price = price ? Number(price).toFixed(2) : existing._meta.price;
                existing._meta.change = change.toFixed(2);
                if (existing.render) existing.render.fillStyle = 'transparent'; // Will draw gradient

                // resize bubble smoothly if magnitude changed significantly
                const newRadius = getBaseBubbleRadius(change);
                const currentRadius = existing.circleRadius || (existing.bounds ? (existing.bounds.max.x - existing.bounds.min.x)/2 : newRadius);
                if (Math.abs(newRadius - currentRadius) > 1) {
                    const scale = newRadius / currentRadius;
                    Matter.Body.scale(existing, scale, scale);
                    // update circleRadius if present
                    if (existing.circleRadius) existing.circleRadius = newRadius;
                }
            } else {
                createBubble(symbol, change, { price, prevClose, name: stock.ticker });
            }
        });

        // start websocket to receive live quotes and update bubbles (only once)
        if (!isAlpacaWSStarted) {
            startAlpacaWebsocket(symbolList);
            isAlpacaWSStarted = true;
        }

        // reset progress timer after successful snapshot update
        if (typeof startProgressTimer === 'function') startProgressTimer();
    } catch (e) {
        document.getElementById('status').innerText = "Error fetching data. Check Console.";
        console.error(e);
    }
}

function createBubble(symbol, change, meta = {}) {
    const radius = getBaseBubbleRadius(change); // Responsive size based on window

    // Helper to check for collision with existing bodies
    let spawnX, spawnY;
    let attempts = 0;
    const maxAttempts = 50;
    let overlapping = true;

    // Try to find a non-overlapping spawn position
    while (overlapping && attempts < maxAttempts) {
        spawnX = Math.max(radius + 10, Math.random() * (width - 2 * radius - 20) + radius + 10);
        spawnY = Math.max(radius + 10, Math.random() * Math.max(0, (height - 2 * radius - 20)) + radius + 10);

        overlapping = Composite.allBodies(world).some(body => {
            if (!body.position) return false;
            const dist = Math.sqrt((body.position.x - spawnX)**2 + (body.position.y - spawnY)**2);
            return dist < (radius + (body.circleRadius || 0) + 10);
        });
        attempts++;
    }

    const bubble = Bodies.circle(
        spawnX,
        spawnY, 
        radius, 
        {
            restitution: 0.8, // Bounciness
            frictionAir: 0.02,
            render: { fillStyle: 'transparent' } // Will draw gradient in afterRender
        }
    );

    // Apply a small random kick to start movement
    Matter.Body.setVelocity(bubble, { 
        x: (Math.random() - 0.5) * 5, 
        y: (Math.random() - 0.5) * 5 
    });

    Composite.add(world, bubble);
    // attach metadata to the body for dynamic rendering
    bubble.ticker = symbol;
    bubble._meta = {
        change: (change || 0).toFixed ? (change).toFixed(2) : String(change),
        price: meta.price ? meta.price.toFixed(2) : null,
        prevClose: meta.prevClose || null,
        name: meta.name || symbol
    };
}

// global afterRender to draw bubbles with gradient, hover outline, and labels
Events.on(render, 'afterRender', () => {
    const context = render.context;
    context.fillStyle = "white";
    context.textAlign = "center";
    context.textBaseline = 'middle';

    const bodies = Composite.allBodies(world);

    // detect hover via mouse point query
    const hoveredBodies = Matter.Query.point(bodies, mouse.position);
    const hoveredBubble = hoveredBodies.find(b => b.circleRadius);

    // Draw bubbles with radial gradient (high-contrast red/green edges)
    for (const body of bodies) {
        if (!body.circleRadius) continue;
        const meta = body._meta || {};
        const change = parseFloat(meta.change) || 0;
        const edge = change >= 0 ? '#00ff00' : '#ff0000'; // bright green/red edges
        const mid = change >= 0 ? 'rgba(0,255,0,0.6)' : 'rgba(255,0,0,0.6)';
        const gradient = context.createRadialGradient(body.position.x, body.position.y, 0, body.position.x, body.position.y, body.circleRadius);
        gradient.addColorStop(0, 'rgba(0,0,0,0)'); // transparent center
        gradient.addColorStop(0.7, 'rgba(0,0,0,0)');
        gradient.addColorStop(0.95, mid);
        gradient.addColorStop(1, edge);
        context.fillStyle = gradient;
        context.beginPath();
        context.arc(body.position.x, body.position.y, body.circleRadius, 0, 2 * Math.PI);
        context.fill();
    }

    // Draw hover outline and labels
    for (const body of bodies) {
        if (!body.circleRadius) continue;
        const radius = body.circleRadius;

        if (hoveredBubble === body) {
            context.beginPath();
            context.arc(body.position.x, body.position.y, radius + 0.5, 0, 2 * Math.PI);
            context.strokeStyle = 'rgba(255,255,255,0.85)';
            context.lineWidth = 1.6;
            context.stroke();
            context.closePath();
        }

        const meta = body._meta || {};
        const ticker = body.ticker || (meta.name || '');
        const changeText = meta.change !== undefined ? `${meta.change}%` : '';

        // Dynamically calculate font sizes based on bubble radius
        const tickerFontSize = Math.max(10, Math.round(radius * 0.32));
        const changeFontSize = Math.max(8, Math.round(radius * 0.22));

        context.fillStyle = "white";
        context.font = `bold ${tickerFontSize}px Arial`;
        context.fillText(ticker, body.position.x, body.position.y - (changeFontSize / 3));
        
        context.font = `${changeFontSize}px Arial`;
        context.fillText(changeText, body.position.x, body.position.y + (tickerFontSize / 1.5));
    }
});

// start Alpaca websocket (tries 'iex' data source)
let alpacaWS = null;
let isAlpacaWSStarted = false;
function startAlpacaWebsocket(symbols) {
    try {
        const url = 'wss://stream.data.alpaca.markets/v2/iex';
        alpacaWS = new WebSocket(url);
        alpacaWS.onopen = () => {
            // authenticate
            alpacaWS.send(JSON.stringify({ action: 'auth', key: API_KEY, secret: SECRET_KEY }));
            // subscribe to quotes
            alpacaWS.send(JSON.stringify({ action: 'subscribe', quotes: symbols }));
            console.log('Alpaca WS connected, subscribed to', symbols);
        };
        alpacaWS.onmessage = (evt) => {
            try {
                const msg = JSON.parse(evt.data);
                // handle messages of form { stream: 'Q.SYMB', data: { quote: {...} } }
                let payload = null;
                let stream = null;
                if (msg.stream && msg.data) { payload = msg.data; stream = msg.stream; }
                else if (msg.data) { payload = msg.data; }
                else payload = msg;

                let sym = null;
                if (stream) {
                    const parts = stream.split('.');
                    sym = parts[1];
                } else if (payload && payload.symbol) sym = payload.symbol;
                else if (payload && payload.sym) sym = payload.sym;

                if (!sym) return;

                // attempt to extract a price
                let price = null;
                if (payload.quote) price = payload.quote.ap || payload.quote.bp;
                if (!price && payload.ap) price = payload.ap;
                if (!price && payload.bp) price = payload.bp;
                if (!price && payload.p) price = payload.p;

                if (!price) return;

                // update body metadata
                const bodies = Composite.allBodies(world);
                for (const b of bodies) {
                    if (b.ticker === sym) {
                        b._meta = b._meta || {};
                        const prevClose = b._meta.prevClose;
                        b._meta.price = Number(price).toFixed(2);
                        if (prevClose) {
                            const change = ((price - prevClose) / prevClose) * 100;
                            b._meta.change = change.toFixed(2);
                        }
                        // update color render
                        if (b.render) b.render.fillStyle = 'transparent'; // Will draw gradient
                        break;
                    }
                }
            } catch (e) { console.error('WS parse error', e); }
        };
        alpacaWS.onerror = (e) => console.error('Alpaca WS error', e);
        alpacaWS.onclose = () => console.log('Alpaca WS closed');
    } catch (e) {
        console.error('Failed to start Alpaca websocket', e);
    }
}

/**
 * Explicitly resolve overlaps between bubbles by pushing them apart.
 * Matter.js handles collisions via impulses, but this position-based
 * resolution ensures bubbles never stay overlapped, especially during resizes.
 */
function resolveOverlaps() {
    const bodies = Composite.allBodies(world).filter(b => b.circleRadius);
    const iterations = 4; // Multiple passes to resolve complex overlap chains
    
    for (let iter = 0; iter < iterations; iter++) {
        for (let i = 0; i < bodies.length; i++) {
            for (let j = i + 1; j < bodies.length; j++) {
                const b1 = bodies[i];
                const b2 = bodies[j];
                let dx = b1.position.x - b2.position.x;
                let dy = b1.position.y - b2.position.y;
                let distSq = dx * dx + dy * dy;
                const minDistance = b1.circleRadius + b2.circleRadius + 1.5;
                const minDistanceSq = minDistance * minDistance;

                if (distSq < minDistanceSq) {
                    let distance = Math.sqrt(distSq);
                    if (distance === 0) {
                        dx = Math.random() - 0.5;
                        dy = Math.random() - 0.5;
                        distance = Math.sqrt(dx * dx + dy * dy);
                    }
                    const overlap = minDistance - distance;
                    const nx = dx / distance;
                    const ny = dy / distance;
                    const shiftX = nx * (overlap / 2);
                    const shiftY = ny * (overlap / 2);

                    Matter.Body.setPosition(b1, { x: b1.position.x + shiftX, y: b1.position.y + shiftY });
                    Matter.Body.setPosition(b2, { x: b2.position.x - shiftX, y: b2.position.y - shiftY });
                }
            }
        }
    }
}

// Helper function to clamp a bubble strictly within boundaries
function clampBubblePosition(body) {
    if (!body.circleRadius) return;
    const r = body.circleRadius;
    let px = body.position.x;
    let py = body.position.y;
    let vx = body.velocity.x;
    let vy = body.velocity.y;
    let changed = false;

    // left boundary
    if (px - r < 0) {
        px = r;
        vx = Math.abs(vx) * 0.6;
        changed = true;
    }
    // right boundary
    if (px + r > width) {
        px = width - r;
        vx = -Math.abs(vx) * 0.6;
        changed = true;
    }
    // top boundary
    if (py - r < 0) {
        py = r;
        vy = Math.abs(vy) * 0.6;
        changed = true;
    }
    // bottom boundary (strict to prevent overflow)
    if (py + r > height) {
        py = height - r;
        vy = -Math.abs(vy) * 0.6;
        changed = true;
    }

    if (changed) {
        Matter.Body.setPosition(body, { x: px, y: py });
        Matter.Body.setVelocity(body, { x: vx, y: vy });
    }
}

// Keep bubbles within viewport during physics updates
Events.on(engine, 'beforeUpdate', () => {
    const bodies = Composite.allBodies(world);

    // Safety check for active drags: force release if mouse or bubble hits bounds
    if (mouseConstraint.body) {
        const m = mouseConstraint.mouse.position;

        const mouseOutside = m.x < 2 || m.x > width - 2 || m.y < 2 || m.y > height - 2;

        if (mouseOutside) {
            releaseDrag();
        }
    }

    for (const body of bodies) {
        if (body.circleRadius) {
            clampBubblePosition(body);
        }
    }
    resolveOverlaps();
});

// Also clamp after physics simulation
Events.on(engine, 'afterUpdate', () => {
    const bodies = Composite.allBodies(world);
    for (const body of bodies) {
        if (body.circleRadius) {
            clampBubblePosition(body);
        }
    }
    resolveOverlaps();
});

// --- progress timer for next snapshot ---
const UPDATE_SECONDS = 15;
let nextUpdateTime = Date.now() + UPDATE_SECONDS * 1000;
let progressIntervalId = null;
function updateProgress() {
    const now = Date.now();
    const remaining = Math.max(0, nextUpdateTime - now);
    const percent = Math.min(1, (UPDATE_SECONDS * 1000 - remaining) / (UPDATE_SECONDS * 1000));
    const bar = document.getElementById('progress-bar');
    if (bar) bar.style.width = (percent * 100) + '%';
}

function startProgressTimer() {
    nextUpdateTime = Date.now() + UPDATE_SECONDS * 1000;
    if (progressIntervalId) clearInterval(progressIntervalId);
    updateProgress();
    progressIntervalId = setInterval(updateProgress, 200);
}

// initial start
startProgressTimer();

// Handle window resize to update canvas and wall positions
window.addEventListener('resize', () => {
    HEADER_HEIGHT = window.innerWidth <= 768 ? 52 : 68;
    width = window.innerWidth;
    height = window.innerHeight - HEADER_HEIGHT;
    render.options.width = width;
    render.options.height = height;
    render.bounds.max.x = width;
    render.bounds.max.y = height;
    if (render.context) render.context.canvas.width = width;
    if (render.context) render.context.canvas.height = height;

    // resize existing bubbles to match new window scale
    const bubbleScale = getBubbleScale();
    const bodies = Composite.allBodies(world).filter(b => b.circleRadius);

    // Reposition bubbles to prevent overlap after resize
    bodies.forEach((body, index) => {
        const meta = body._meta || {};
        const change = parseFloat(meta.change) || 0;
        const targetRadius = (60 + Math.abs(change) * 5) * bubbleScale;
        const currentRadius = body.circleRadius;

        if (Math.abs(targetRadius - currentRadius) > 1) {
            const applyScale = targetRadius / currentRadius;
            Matter.Body.scale(body, applyScale, applyScale);
            if (body.circleRadius) body.circleRadius = targetRadius;
        }

        // Clamp positions to stay within new bounds
        const r = body.circleRadius;
        let px = Math.max(r + 5, Math.min(width - r - 5, body.position.x));
        let py = Math.max(r + 5, Math.min(height - r - 5, body.position.y));
        Matter.Body.setPosition(body, { x: px, y: py });
    });

    // Instantly resolve overlaps after scaling and repositioning
    resolveOverlaps();

    // remove old walls and recreate with new dimensions
    const oldWalls = Composite.allBodies(world).filter(b => b.isStatic);
    oldWalls.forEach(w => Composite.remove(world, w));
    Composite.add(world, [
        Bodies.rectangle(width/2, -50, width, 100, wallOptions),                 // Top
        Bodies.rectangle(width/2, height+50, width, 100, wallOptions),           // Bottom
        Bodies.rectangle(-50, height/2, 100, height, wallOptions),               // Left
        Bodies.rectangle(width+50, height/2, 100, height, wallOptions)           // Right
    ]);
});

// load data and refresh snapshots every 30 seconds
fetchAndCreateBubbles();
setInterval(() => {
    fetchAndCreateBubbles();
    // ensure progress resets even if fetch takes time
    startProgressTimer();
}, UPDATE_SECONDS * 1000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Bubbles - Alpaca Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #121212; font-family: sans-serif; }
        #controls { position: absolute; top: 10px; left: 10px; color: white; z-index: 10; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="controls">
    <strong>Alpaca Bubbles</strong><br>
    <span id="status">Loading Market Data...</span>
</div>

<script>
// --- CONFIGURATION ---
const API_KEY = 'PKMGEVTEOG26N7FTKGP34IYNZU';
const SECRET_KEY = 'UHpp39woj29vzm6paLknWEmf6RKZPMy7EhYkxx6oxAz';
const SYMBOLS = 'NVDA,MSFT,TSLA,AVGO,AAPL,AMD,META,GOOGL'; // Added a few more for better visuals
const DATA_URL = `https://data.alpaca.markets/v2/stocks/snapshots?symbols=${SYMBOLS}`;

// --- PHYSICS ENGINE SETUP ---
const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Events } = Matter;
const engine = Engine.create();
const world = engine.world;
engine.gravity.y = 0; // Floating bubbles (no gravity)

const width = window.innerWidth;
const height = window.innerHeight;

const render = Render.create({
    element: document.body,
    engine: engine,
    options: { width, height, wireframes: false, background: '#121212' }
});

Render.run(render);
Runner.run(Runner.create(), engine);

// Add invisible walls so bubbles don't fly away
const wallOptions = { isStatic: true, render: { visible: false } };
Composite.add(world, [
    Bodies.rectangle(width/2, -50, width, 100, wallOptions),         // Top
    Bodies.rectangle(width/2, height+50, width, 100, wallOptions),  // Bottom
    Bodies.rectangle(-50, height/2, 100, height, wallOptions),      // Left
    Bodies.rectangle(width+50, height/2, 100, height, wallOptions)  // Right
]);

// Add mouse control so you can toss the bubbles around
const mouse = Mouse.create(render.canvas);
// Hide the visual constraint line (prevents the yellow line while dragging)
const mouseConstraint = MouseConstraint.create(engine, {
    mouse: mouse,
    constraint: { render: { visible: false } }
});
Composite.add(world, mouseConstraint);

// --- DATA FETCHING & BUBBLE CREATION ---
async function fetchAndCreateBubbles() {
    try {
        const response = await fetch(DATA_URL, {
            headers: { 'APCA-API-KEY-ID': API_KEY, 'APCA-API-SECRET-KEY': SECRET_KEY }
        });
        const data = await response.json();
        document.getElementById('status').innerText = "Live Market Data Active";

        Object.keys(data).forEach((symbol, index) => {
            const stock = data[symbol];
            const price = stock.latestTrade.p;
            const prevClose = stock.prevDailyBar.c;
            const change = ((price - prevClose) / prevClose * 100).toFixed(2);
            
            createBubble(symbol, parseFloat(change));
        });
    } catch (e) {
        document.getElementById('status').innerText = "Error fetching data. Check Console.";
        console.error(e);
    }
}

function createBubble(symbol, change) {
    const radius = 60 + Math.abs(change) * 5; // Size based on volatility
    const color = change >= 0 ? '#2ecc71' : '#e74c3c'; // Green if up, Red if down
    
    const bubble = Bodies.circle(
        // ensure initial spawn keeps the entire circle on-screen
        Math.max(radius, Math.random() * (width - 2 * radius) + radius),
        Math.max(radius, Math.random() * (height - 2 * radius) + radius), 
        radius, 
        {
            restitution: 0.8, // Bounciness
            frictionAir: 0.02,
            render: { fillStyle: color }
        }
    );

    // Apply a small random kick to start movement
    Matter.Body.setVelocity(bubble, { 
        x: (Math.random() - 0.5) * 5, 
        y: (Math.random() - 0.5) * 5 
    });

    Composite.add(world, bubble);

    // Custom rendering to draw text on the bubble
    Events.on(render, 'afterRender', () => {
        const context = render.context;
        context.font = "bold 16px Arial";
        context.fillStyle = "white";
        context.textAlign = "center";
        context.fillText(symbol, bubble.position.x, bubble.position.y - 5);
        context.font = "12px Arial";
        context.fillText(change + "%", bubble.position.x, bubble.position.y + 15);
    });
}

// Keep bubbles within viewport during physics updates
Events.on(engine, 'beforeUpdate', () => {
    const bodies = Composite.allBodies(world);
    for (const body of bodies) {
        // only handle circular bodies (our bubbles)
        if (!body.circleRadius) continue;
        const r = body.circleRadius;
        let px = body.position.x;
        let py = body.position.y;
        let vx = body.velocity.x;
        let vy = body.velocity.y;

        // left
        if (px - r < 0) {
            px = r;
            vx = Math.abs(vx) * 0.6;
        }
        // right
        if (px + r > width) {
            px = width - r;
            vx = -Math.abs(vx) * 0.6;
        }
        // top
        if (py - r < 0) {
            py = r;
            vy = Math.abs(vy) * 0.6;
        }
        // bottom
        if (py + r > height) {
            py = height - r;
            vy = -Math.abs(vy) * 0.6;
        }

        // apply corrections if needed
        if (px !== body.position.x || py !== body.position.y) {
            Matter.Body.setPosition(body, { x: px, y: py });
            Matter.Body.setVelocity(body, { x: vx, y: vy });
        }
    }
});

fetchAndCreateBubbles();
</script>
</body>
</html>
